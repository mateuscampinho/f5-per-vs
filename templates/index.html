<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>F5 VS Flow Mapper</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

    header {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 14px 24px; display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #58a6ff; }
    .badge { background: #388e3c; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; display: none; }
    .badge.visible { display: inline-block; }

    .layout { display: flex; height: calc(100vh - 53px); }

    /* Sidebar */
    .sidebar {
      width: 300px; min-width: 260px; background: #161b22;
      border-right: 1px solid #30363d; padding: 16px; display: flex;
      flex-direction: column; gap: 16px; overflow-y: auto;
    }
    .card { background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 14px; }
    .card h2 { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #8b949e; margin-bottom: 10px; }

    label { font-size: 0.8rem; color: #8b949e; display: block; margin-bottom: 3px; margin-top: 8px; }
    label:first-of-type { margin-top: 0; }
    input[type="text"], input[type="password"] {
      width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #e6edf3; padding: 6px 10px; font-size: 0.85rem; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: #58a6ff; }

    button { width: 100%; margin-top: 10px; padding: 7px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: opacity .15s, background .15s; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2ea043; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn-secondary:hover:not(:disabled) { background: #30363d; }
    .btn-danger { background: #b91c1c; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }

    #search-section { display: none; }

    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 4px; }
    .stat { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 7px 10px; }
    .stat .num { font-size: 1.2rem; font-weight: 700; color: #58a6ff; }
    .stat .lbl { color: #8b949e; font-size: 0.7rem; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    .toolbar {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 7px 14px; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #8b949e;
    }
    .toolbar button { width: auto; margin-top: 0; padding: 4px 10px; }

    #diagram-area { flex: 1; overflow: auto; padding: 20px; display: flex; align-items: flex-start; }
    #diagram-container { background: #fff; border-radius: 8px; padding: 20px; min-width: 500px; display: none; }

    .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; color: #484f58; gap: 10px; font-size: 0.88rem; }
    .placeholder svg { opacity: .3; }

    .error-msg { background: #3d1a1a; border: 1px solid #b91c1c; color: #fca5a5; border-radius: 6px; padding: 10px 12px; font-size: 0.8rem; margin-top: 8px; display: none; }
    .error-msg.visible { display: block; }

    .spinner { display: none; width: 13px; height: 13px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 5px; }
    .spinner.active { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Detail Panel */
    #detail-panel {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 480px; background: #161b22; border-left: 1px solid #30363d;
      display: flex; flex-direction: column; transform: translateX(100%);
      transition: transform .25s ease; z-index: 100; box-shadow: -4px 0 20px #0008;
    }
    #detail-panel.open { transform: translateX(0); }

    .panel-header {
      padding: 14px 16px; border-bottom: 1px solid #30363d;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .panel-header h3 { font-size: 0.9rem; color: #58a6ff; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .panel-header .type-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; flex-shrink: 0; }
    .type-policy { background: #1565c0; color: #e3f2fd; }
    .type-irule  { background: #e65100; color: #fff3e0; }

    .panel-close { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 1.2rem; line-height: 1; padding: 4px; width: auto; margin-top: 0; }
    .panel-close:hover { color: #e6edf3; }

    .panel-body { flex: 1; overflow-y: auto; padding: 14px 16px; }

    /* Policy rules table */
    .rule-block { background: #21262d; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .rule-title { background: #0d1117; padding: 8px 12px; font-size: 0.8rem; font-weight: 600; color: #e6edf3; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px; }
    .rule-ord { background: #58a6ff22; color: #58a6ff; border-radius: 4px; padding: 1px 6px; font-size: 0.72rem; }
    .rule-section { padding: 8px 12px; }
    .rule-section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .05em; color: #8b949e; margin-bottom: 6px; }
    .cond-row, .act-row { font-size: 0.78rem; color: #e6edf3; padding: 4px 8px; background: #0d1117; border-radius: 4px; margin-bottom: 3px; font-family: monospace; }
    .act-row { color: #a5d6a7; }
    .empty-note { font-size: 0.75rem; color: #484f58; font-style: italic; }

    /* iRule code */
    .irule-code {
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      padding: 12px; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.78rem;
      line-height: 1.6; white-space: pre; overflow-x: auto; color: #e6edf3;
    }
    .tok-comment { color: #8b949e; font-style: italic; }
    .tok-keyword { color: #ff7b72; font-weight: 600; }
    .tok-string  { color: #a5d6a7; }
    .tok-cmd     { color: #79c0ff; }
    .tok-braces  { color: #f2cc60; }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <line x1="8" y1="21" x2="16" y2="21"/>
    <line x1="12" y1="17" x2="12" y2="21"/>
  </svg>
  <h1>F5 BIG-IP — VS Flow Mapper</h1>
  <span class="badge" id="connected-badge">Conectado</span>
</header>

<div class="layout">
  <aside class="sidebar">

    <div class="card" id="login-section">
      <h2>Conexão F5</h2>
      <label>IP / Hostname</label>
      <input type="text" id="inp-host" placeholder="192.168.1.1" autocomplete="off"/>
      <label>Usuário</label>
      <input type="text" id="inp-user" placeholder="admin" autocomplete="off"/>
      <label>Senha</label>
      <input type="password" id="inp-pass" placeholder="••••••••"/>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">
        <span class="spinner" id="spin-login"></span>Conectar
      </button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <div class="card" id="search-section">
      <h2>Buscar Virtual Server</h2>
      <label>Nome ou IP de Destino</label>
      <input type="text" id="inp-query" placeholder="vs_web_80 ou 10.0.0.100"
             onkeydown="if(event.key==='Enter') doSearch()"/>
      <button class="btn-primary" id="btn-search" onclick="doSearch()">
        <span class="spinner" id="spin-search"></span>Mapear Fluxo
      </button>
      <div class="error-msg" id="search-error"></div>
    </div>

    <div class="card" id="summary-section" style="display:none">
      <h2>Resumo</h2>
      <div style="font-size:.8rem;color:#8b949e;margin-bottom:6px" id="vs-label">—</div>
      <div class="summary-grid">
        <div class="stat"><div class="num" id="s-pools">0</div><div class="lbl">Pools</div></div>
        <div class="stat"><div class="num" id="s-policies">0</div><div class="lbl">Policies</div></div>
        <div class="stat"><div class="num" id="s-irules">0</div><div class="lbl">iRules</div></div>
        <div class="stat"><div class="num" id="s-default">—</div><div class="lbl">Default Pool</div></div>
      </div>
    </div>

    <button class="btn-danger" id="btn-logout" style="display:none" onclick="doLogout()">Desconectar</button>

  </aside>

  <main class="main">
    <div class="toolbar">
      <span id="toolbar-label">Faça login e busque um Virtual Server.</span>
      <button class="btn-secondary" id="btn-export" onclick="exportSVG()" style="display:none;margin-left:auto">
        Exportar SVG
      </button>
    </div>

    <div id="diagram-area">
      <div class="placeholder" id="placeholder">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
        <span>Nenhum diagrama gerado</span>
      </div>
      <div id="diagram-container"></div>
    </div>

    <!-- Detail Panel -->
    <div id="detail-panel">
      <div class="panel-header">
        <h3 id="panel-title">Detalhes</h3>
        <span class="type-badge" id="panel-badge"></span>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </main>
</div>

<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'default',
    securityLevel: 'loose',   // required for click callbacks
    flowchart: { htmlLabels: true, curve: 'basis' }
  });

  let sessionId = null;
  let detailStore = {};

  // Called by Mermaid click directives
  window.showDetail = function(nodeId) {
    const detail = detailStore[nodeId];
    if (!detail) return;
    const panel = document.getElementById('detail-panel');
    document.getElementById('panel-title').textContent = detail.name;
    const badge = document.getElementById('panel-badge');
    const body  = document.getElementById('panel-body');

    if (detail.type === 'policy') {
      badge.textContent = 'LTM Policy';
      badge.className = 'type-badge type-policy';
      body.innerHTML = renderPolicy(detail);
    } else {
      badge.textContent = 'iRule';
      badge.className = 'type-badge type-irule';
      body.innerHTML = renderIRule(detail);
    }
    panel.classList.add('open');
  };

  function closePanel() {
    document.getElementById('detail-panel').classList.remove('open');
  }

  function renderPolicy(detail) {
    if (!detail.rules || detail.rules.length === 0)
      return '<p class="empty-note">Nenhuma regra encontrada.</p>';

    return detail.rules.map(rule => {
      const conds = (rule.conditions || []).map(c => {
        const keys = ['httpUri','httpHeader','httpMethod','httpCookie','sslExtension','geoip'];
        const match = keys.filter(k => c[k]).join('/') || 'match';
        const vals = (c.values || []).join(', ');
        const op = c.equals ? '==' : c.contains ? 'contains' : c.startsWith ? 'startsWith' : '';
        return `<div class="cond-row">${esc(match)} ${esc(op)} ${esc(vals)}</div>`;
      }).join('') || '<div class="empty-note">Sem condições (default)</div>';

      const acts = (rule.actions || []).map(a => {
        if (a.forward && a.pool) return `<div class="act-row">forward → pool: ${esc(a.pool)}</div>`;
        if (a.redirect)          return `<div class="act-row">redirect → ${esc(a.location || '')}</div>`;
        if (a.reset)             return `<div class="act-row">reset connection</div>`;
        if (a.drop)              return `<div class="act-row">drop</div>`;
        if (a.persist)           return `<div class="act-row">persist: ${esc(a.tmName || '')}</div>`;
        const key = Object.keys(a).filter(k => k !== 'name' && k !== 'ordinal')[0] || 'action';
        return `<div class="act-row">${esc(key)}: ${esc(JSON.stringify(a[key]).slice(0,60))}</div>`;
      }).join('') || '<div class="empty-note">Sem ações</div>';

      return `
        <div class="rule-block">
          <div class="rule-title">
            <span class="rule-ord">#${rule.ordinal}</span>
            ${esc(rule.name)}
          </div>
          <div class="rule-section">
            <div class="rule-section-title">Condições</div>${conds}
          </div>
          <div class="rule-section" style="border-top:1px solid #30363d">
            <div class="rule-section-title">Ações</div>${acts}
          </div>
        </div>`;
    }).join('');
  }

  function renderIRule(detail) {
    const highlighted = highlightTcl(detail.content || '');
    return `<div class="irule-code">${highlighted}</div>`;
  }

  function highlightTcl(code) {
    const keywords = /\b(if|else|elseif|when|foreach|for|while|switch|return|set|proc|namespace|package|catch|error|break|continue|and|or|not|in|ni)\b/g;
    const commands = /\b(pool|node|snat|persist|redirect|respond|HTTP::respond|HTTP::redirect|HTTP::header|HTTP::uri|HTTP::host|HTTP::method|LB::server|IP::client_addr|TCP::local_port|SSL::cert|log|after|event|priority|class|datagroup|table|timing)\b/g;

    return esc(code)
      .replace(/(&lt;!--[\s\S]*?--&gt;|#[^\n]*)/g, m => `<span class="tok-comment">${m}</span>`)
      .replace(/(&quot;[^&]*&quot;|&#39;[^&#]*&#39;|\{[^}]*\})/g, m => `<span class="tok-string">${m}</span>`)
      .replace(keywords, m => `<span class="tok-keyword">${m}</span>`)
      .replace(commands, m => `<span class="tok-cmd">${m}</span>`)
      .replace(/([{}])/g, m => `<span class="tok-braces">${m}</span>`);
  }

  // ── Auth ──────────────────────────────────────────────

  async function doLogin() {
    const host = v('inp-host'), user = v('inp-user'), pass = v('inp-pass');
    const errEl = ge('login-error');
    errEl.classList.remove('visible');
    if (!host || !user || !pass) { showErr(errEl, 'Preencha todos os campos.'); return; }

    setLoading('spin-login', 'btn-login', true);
    try {
      const resp = await post('/api/login', { host, username: user, password: pass });
      const data = await resp.json();
      if (!resp.ok) { showErr(errEl, data.detail || 'Erro ao conectar.'); return; }
      sessionId = data.session_id;
      ge('login-section').style.display = 'none';
      ge('search-section').style.display = 'block';
      ge('btn-logout').style.display = 'block';
      ge('connected-badge').classList.add('visible');
      ge('toolbar-label').textContent = `Conectado em ${host} — busque um VS pelo nome ou IP de destino.`;
      ge('inp-query').focus();
    } finally { setLoading('spin-login', 'btn-login', false); }
  }

  async function doSearch() {
    const query = v('inp-query');
    const errEl = ge('search-error');
    errEl.classList.remove('visible');
    if (!query) { showErr(errEl, 'Informe o nome ou IP do VS.'); return; }

    closePanel();
    setLoading('spin-search', 'btn-search', true);
    ge('diagram-container').style.display = 'none';
    ge('placeholder').style.display = 'flex';
    ge('summary-section').style.display = 'none';
    ge('btn-export').style.display = 'none';

    try {
      const resp = await post('/api/search', { session_id: sessionId, query });
      const data = await resp.json();
      if (!resp.ok) { showErr(errEl, data.detail || 'Erro na busca.'); return; }
      detailStore = data.detail_store || {};
      await renderDiagram(data.mermaid);
      updateSummary(data);
    } finally { setLoading('spin-search', 'btn-search', false); }
  }

  async function doLogout() {
    if (sessionId) {
      await post('/api/logout', { session_id: sessionId }).catch(() => {});
      sessionId = null;
    }
    ge('login-section').style.display = 'block';
    ge('search-section').style.display = 'none';
    ge('btn-logout').style.display = 'none';
    ge('summary-section').style.display = 'none';
    ge('connected-badge').classList.remove('visible');
    ge('diagram-container').style.display = 'none';
    ge('placeholder').style.display = 'flex';
    ge('btn-export').style.display = 'none';
    ge('toolbar-label').textContent = 'Faça login e busque um Virtual Server.';
    ge('inp-pass').value = '';
    closePanel();
  }

  // ── Diagram ───────────────────────────────────────────

  async function renderDiagram(code) {
    const container = ge('diagram-container');
    container.innerHTML = '';
    try {
      const { svg } = await mermaid.render('mg' + Date.now(), code);
      container.innerHTML = svg;
      ge('placeholder').style.display = 'none';
      container.style.display = 'block';
      ge('btn-export').style.display = 'inline-block';
    } catch (e) {
      container.innerHTML = `<pre style="color:#b91c1c;font-size:.75rem;white-space:pre-wrap">${esc(code)}</pre>`;
      container.style.display = 'block';
      ge('placeholder').style.display = 'none';
    }
  }

  function updateSummary(data) {
    const s = data.summary;
    ge('vs-label').textContent = `${data.vs_name}  ·  ${data.destination}`;
    ge('s-pools').textContent = s.total_pools;
    ge('s-policies').textContent = s.policies;
    ge('s-irules').textContent = s.irules;
    const dp = s.default_pool || '—';
    ge('s-default').textContent = dp.split('/').pop() || dp;
    ge('summary-section').style.display = 'block';
    ge('toolbar-label').textContent = `VS: ${data.vs_name}  |  Dest: ${data.destination}`;
  }

  function exportSVG() {
    const svg = document.querySelector('#diagram-container svg');
    if (!svg) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([svg.outerHTML], { type: 'image/svg+xml' }));
    a.download = 'f5-vs-flow.svg';
    a.click();
  }

  // ── Utils ─────────────────────────────────────────────

  const ge = id => document.getElementById(id);
  const v  = id => ge(id).value.trim();
  const post = (url, body) => fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const esc = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  function showErr(el, msg) { el.textContent = msg; el.classList.add('visible'); }
  function setLoading(sid, bid, on) { ge(sid).classList.toggle('active', on); ge(bid).disabled = on; }
</script>
</body>
</html>
