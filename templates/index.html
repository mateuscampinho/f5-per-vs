<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>F5 VS Flow Mapper</title>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #58a6ff; }
    .badge { background: #388e3c; color: #fff; font-size: .7rem; padding: 2px 8px; border-radius: 20px; display: none; }
    .badge.visible { display: inline-block; }

    .layout { display: flex; height: calc(100vh - 53px); }

    /* Sidebar */
    .sidebar { width: 300px; min-width: 260px; background: #161b22; border-right: 1px solid #30363d; padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
    .card { background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 14px; }
    .card h2 { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #8b949e; margin-bottom: 10px; }

    label { font-size: .8rem; color: #8b949e; display: block; margin-bottom: 3px; margin-top: 8px; }
    label:first-of-type { margin-top: 0; }
    input[type="text"], input[type="password"] { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; padding: 6px 10px; font-size: .85rem; outline: none; transition: border-color .15s; }
    input:focus { border-color: #58a6ff; }

    button { width: 100%; margin-top: 10px; padding: 7px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: .85rem; font-weight: 500; transition: opacity .15s, background .15s; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary  { background: #238636; color: #fff; }
    .btn-primary:hover:not(:disabled)  { background: #2ea043; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn-secondary:hover:not(:disabled) { background: #30363d; }
    .btn-danger { background: #b91c1c; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }

    #search-section { display: none; }

    /* Match list */
    .match-list { display: flex; flex-direction: column; gap: 6px; }
    .match-item { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 10px; cursor: pointer; transition: border-color .15s, background .15s; }
    .match-item:hover { border-color: #58a6ff; background: #161b22; }
    .match-item.active { border-color: #58a6ff; background: #0d2040; }
    .match-name { font-size: .82rem; font-weight: 600; }
    .match-dest { font-size: .72rem; color: #8b949e; margin-top: 2px; font-family: monospace; }
    .match-part { font-size: .68rem; color: #484f58; margin-top: 1px; }

    /* Summary */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 7px 10px; }
    .stat .num { font-size: 1.2rem; font-weight: 700; color: #58a6ff; }
    .stat .lbl { color: #8b949e; font-size: .7rem; }
    .waf-badge { background: #b91c1c22; border: 1px solid #b91c1c; border-radius: 6px; padding: 6px 10px; font-size: .78rem; color: #fca5a5; display: none; margin-top: 6px; }
    .waf-badge.visible { display: block; }

    .error-msg { background: #3d1a1a; border: 1px solid #b91c1c; color: #fca5a5; border-radius: 6px; padding: 9px 12px; font-size: .8rem; margin-top: 8px; display: none; }
    .error-msg.visible { display: block; }

    .spinner { display: none; width: 13px; height: 13px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 5px; }
    .spinner.active { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .toolbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 7px 14px; display: flex; align-items: center; gap: 6px; font-size: .8rem; color: #8b949e; flex-wrap: wrap; }
    .toolbar button { width: auto; margin-top: 0; padding: 4px 10px; }

    .zoom-controls { display: none; align-items: center; gap: 4px; margin-left: auto; }
    .zoom-controls.visible { display: flex; }
    .zoom-btn { width: 28px; height: 28px; margin-top: 0; padding: 0; border-radius: 5px; background: #21262d; border: 1px solid #30363d; color: #e6edf3; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .zoom-btn:hover { background: #30363d; }
    .zoom-btn.wide { width: auto; padding: 0 8px; font-size: .72rem; }
    .zoom-level { font-size: .75rem; color: #8b949e; min-width: 38px; text-align: center; }
    .hint { font-size: .73rem; color: #58a6ff88; }

    #diagram-area { flex: 1; overflow: hidden; background: #f6f8fa; position: relative; }
    #cy { width: 100%; height: 100%; }

    .placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #484f58; gap: 10px; font-size: .88rem; pointer-events: none; }
    .placeholder svg { opacity: .3; }

    /* Legend */
    .legend { position: absolute; bottom: 12px; left: 12px; background: #161b22dd; border: 1px solid #30363d; border-radius: 8px; padding: 8px 12px; display: none; gap: 10px; flex-wrap: wrap; font-size: .7rem; z-index: 10; }
    .legend.visible { display: flex; }
    .leg-item { display: flex; align-items: center; gap: 5px; }
    .leg-dot { width: 12px; height: 12px; border-radius: 3px; border: 2px solid; flex-shrink: 0; }

    /* Detail Panel */
    #detail-panel { position: absolute; top: 0; right: 0; bottom: 0; width: 480px; background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .25s ease; z-index: 100; box-shadow: -4px 0 20px #0008; }
    #detail-panel.open { transform: translateX(0); }
    .panel-header { padding: 12px 14px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; }
    .panel-header h3 { font-size: .9rem; color: #58a6ff; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .type-badge { font-size: .68rem; padding: 2px 8px; border-radius: 12px; flex-shrink: 0; }
    .type-policy { background: #1565c0; color: #e3f2fd; }
    .type-irule  { background: #e65100; color: #fff3e0; }
    .panel-close { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 1.1rem; padding: 4px 6px; width: auto; margin-top: 0; border-radius: 4px; }
    .panel-close:hover { color: #e6edf3; background: #30363d; }
    .panel-body { flex: 1; overflow-y: auto; padding: 14px; }

    /* Policy rules */
    .rule-block { background: #21262d; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .rule-title { background: #0d1117; padding: 8px 12px; font-size: .8rem; font-weight: 600; color: #e6edf3; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px; }
    .rule-ord { background: #58a6ff22; color: #58a6ff; border-radius: 4px; padding: 1px 6px; font-size: .7rem; }
    .rule-section { padding: 8px 12px; }
    .rule-section + .rule-section { border-top: 1px solid #30363d; }
    .section-title { font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; color: #8b949e; margin-bottom: 5px; }
    .cond-row { font-size: .76rem; color: #e6edf3; padding: 3px 8px; background: #0d1117; border-radius: 4px; margin-bottom: 3px; font-family: monospace; }
    .act-row  { font-size: .76rem; color: #a5d6a7; padding: 3px 8px; background: #0d1117; border-radius: 4px; margin-bottom: 3px; font-family: monospace; }
    .act-waf  { font-size: .76rem; color: #fca5a5; padding: 3px 8px; background: #3d1a1a; border-radius: 4px; margin-bottom: 3px; font-family: monospace; }
    .empty-note { font-size: .73rem; color: #484f58; font-style: italic; }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <line x1="8" y1="21" x2="16" y2="21"/>
    <line x1="12" y1="17" x2="12" y2="21"/>
  </svg>
  <h1>F5 BIG-IP — VS Flow Mapper</h1>
  <span class="badge" id="connected-badge">Conectado</span>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="card" id="login-section">
      <h2>Conexão F5</h2>
      <label>IP / Hostname</label>
      <input type="text" id="inp-host" placeholder="192.168.1.1" autocomplete="off"/>
      <label>Usuário</label>
      <input type="text" id="inp-user" placeholder="admin" autocomplete="off"/>
      <label>Senha</label>
      <input type="password" id="inp-pass" placeholder="••••••••"/>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">
        <span class="spinner" id="spin-login"></span>Conectar
      </button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <div class="card" id="search-section">
      <h2>Buscar Virtual Server</h2>
      <label>Nome ou IP de Destino</label>
      <input type="text" id="inp-query" placeholder="vs_web, 10.0.0.100, :443…"
             onkeydown="if(event.key==='Enter') doSearch()"/>
      <button class="btn-primary" id="btn-search" onclick="doSearch()">
        <span class="spinner" id="spin-search"></span>Buscar
      </button>
      <div class="error-msg" id="search-error"></div>
    </div>

    <div class="card" id="matches-section" style="display:none">
      <h2 id="matches-title">Resultados</h2>
      <div class="match-list" id="match-list"></div>
    </div>

    <div class="card" id="summary-section" style="display:none">
      <h2>Resumo</h2>
      <div style="font-size:.78rem;color:#8b949e;margin-bottom:6px" id="vs-label">—</div>
      <div class="summary-grid">
        <div class="stat"><div class="num" id="s-pools">0</div><div class="lbl">Pools</div></div>
        <div class="stat"><div class="num" id="s-policies">0</div><div class="lbl">Policies</div></div>
        <div class="stat"><div class="num" id="s-irules">0</div><div class="lbl">iRules</div></div>
        <div class="stat"><div class="num" id="s-default">—</div><div class="lbl">Default Pool</div></div>
      </div>
      <div class="waf-badge" id="waf-badge"></div>
    </div>

    <button class="btn-danger" id="btn-logout" style="display:none" onclick="doLogout()">Desconectar</button>
  </aside>

  <main class="main">
    <div class="toolbar">
      <span id="toolbar-label">Faça login e busque um Virtual Server.</span>
      <span class="hint" id="click-hint" style="display:none">&#9432; Clique em Policy/iRule para detalhes</span>
      <div class="zoom-controls" id="zoom-controls">
        <button class="zoom-btn" onclick="cyZoomOut()" title="Zoom out">&#8722;</button>
        <span class="zoom-level" id="zoom-level">100%</span>
        <button class="zoom-btn" onclick="cyZoomIn()" title="Zoom in">&#43;</button>
        <button class="zoom-btn wide" onclick="cyFit()">Fit</button>
        <button class="zoom-btn wide" onclick="exportPNG()">PNG</button>
      </div>
    </div>

    <div id="diagram-area">
      <div class="placeholder" id="placeholder">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
        <span>Nenhum diagrama gerado</span>
      </div>
      <div id="cy"></div>
      <!-- Legend -->
      <div class="legend" id="legend">
        <div class="leg-item"><div class="leg-dot" style="background:#0d2040;border-color:#58a6ff"></div>VS</div>
        <div class="leg-item"><div class="leg-dot" style="background:#f3f0ff;border-color:#6d28d9"></div>Pool</div>
        <div class="leg-item"><div class="leg-dot" style="background:#e3f2fd;border-color:#1565c0"></div>LTM Policy</div>
        <div class="leg-item"><div class="leg-dot" style="background:#fdf4ff;border-color:#7e22ce"></div>ASM Policy</div>
        <div class="leg-item"><div class="leg-dot" style="background:#fff3e0;border-color:#e65100"></div>iRule</div>
        <div class="leg-item"><div class="leg-dot" style="background:#fef2f2;border-color:#b91c1c"></div>WAF</div>
      </div>
    </div>

    <div id="detail-panel">
      <div class="panel-header">
        <h3 id="panel-title">Detalhes</h3>
        <span class="type-badge" id="panel-badge"></span>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </main>
</div>

<script>
  cytoscape.use(cytoscapeDagre);

  let sessionId  = null;
  let detailStore = {};
  let cy = null;

  const CY_STYLE = [
    { selector: 'node', style: {
        'label': 'data(label)', 'text-valign': 'center', 'text-halign': 'center',
        'text-wrap': 'wrap',
        'font-family': 'Segoe UI, system-ui, sans-serif', 'font-size': '12px',
        'padding': '12px', 'background-color': '#f6f8fa',
        'border-width': 1.5, 'border-color': '#30363d', 'shape': 'roundrectangle',
        'color': '#1f2328', 'width': 'data(w)', 'height': 'data(h)',
        'text-max-width': '500px',
    }},
    { selector: 'node[type="vs"]', style: {
        'background-color': '#0d2040', 'color': '#58a6ff',
        'font-weight': 'bold', 'border-color': '#58a6ff', 'border-width': 2,
    }},
    { selector: 'node[type="pool"]', style: {
        'background-color': '#f3f0ff', 'border-color': '#6d28d9', 'border-width': 2,
        'font-family': 'Consolas, Monaco, monospace', 'font-size': '11px',
        'text-halign': 'left', 'text-justification': 'left', 'text-margin-x': 8,
        'text-max-width': '500px',
    }},
    { selector: 'node[type="policy"]', style: {
        'background-color': '#e3f2fd', 'border-color': '#1565c0', 'border-width': 2,
        'font-weight': 'bold', 'cursor': 'pointer',
    }},
    { selector: 'node[type="policy_asm"]', style: {
        'background-color': '#fdf4ff', 'border-color': '#7e22ce', 'border-width': 2,
        'font-weight': 'bold', 'cursor': 'pointer', 'font-size': '11px',
    }},
    { selector: 'node[type="irule"]', style: {
        'background-color': '#fff3e0', 'border-color': '#e65100', 'border-width': 2,
        'font-weight': 'bold', 'cursor': 'pointer',
    }},
    { selector: 'node[type="rule"]', style: {
        'background-color': '#f6f8fa', 'border-color': '#8b949e', 'font-size': '11px',
    }},
    { selector: 'node[type="waf"]', style: {
        'background-color': '#fef2f2', 'border-color': '#b91c1c', 'border-width': 2,
        'color': '#b91c1c', 'font-weight': 'bold',
    }},
    { selector: 'node[type="redirect"]', style: {
        'background-color': '#fffbeb', 'border-color': '#d97706', 'border-width': 1.5,
        'font-size': '11px', 'color': '#92400e',
    }},
    { selector: 'node:selected', style: {
        'border-width': 3, 'border-color': '#58a6ff',
    }},
    { selector: 'edge', style: {
        'curve-style': 'bezier', 'target-arrow-shape': 'triangle',
        'target-arrow-color': '#8b949e', 'line-color': '#8b949e', 'width': 1.5,
        'label': 'data(label)', 'font-size': '10px', 'color': '#57606a',
        'text-background-color': '#f6f8fa', 'text-background-opacity': 0.85,
        'text-background-padding': '2px', 'text-rotation': 'autorotate',
    }},
  ];

  // ── Login / Logout ────────────────────────────────────

  async function doLogin() {
    const host = v('inp-host'), user = v('inp-user'), pass = v('inp-pass');
    const errEl = ge('login-error');
    errEl.classList.remove('visible');
    if (!host || !user || !pass) { showErr(errEl, 'Preencha todos os campos.'); return; }
    setLoading('spin-login', 'btn-login', true);
    try {
      const resp = await post('/api/login', { host, username: user, password: pass });
      const data = await resp.json();
      if (!resp.ok) { showErr(errEl, data.detail || 'Erro ao conectar.'); return; }
      sessionId = data.session_id;
      ge('login-section').style.display = 'none';
      ge('search-section').style.display = 'block';
      ge('btn-logout').style.display = 'block';
      ge('connected-badge').classList.add('visible');
      ge('toolbar-label').textContent = `Conectado em ${host}`;
      ge('inp-query').focus();
    } finally { setLoading('spin-login', 'btn-login', false); }
  }

  async function doLogout() {
    if (sessionId) { await post('/api/logout', { session_id: sessionId }).catch(() => {}); sessionId = null; }
    destroyCy();
    ge('login-section').style.display = 'block';
    ge('search-section').style.display = 'none';
    ge('matches-section').style.display = 'none';
    ge('btn-logout').style.display = 'none';
    ge('summary-section').style.display = 'none';
    ge('connected-badge').classList.remove('visible');
    ge('cy').style.display = 'none';
    ge('placeholder').style.display = 'flex';
    ge('zoom-controls').classList.remove('visible');
    ge('legend').classList.remove('visible');
    ge('click-hint').style.display = 'none';
    ge('toolbar-label').textContent = 'Faça login e busque um Virtual Server.';
    ge('inp-pass').value = '';
    closePanel();
  }

  // ── Search ────────────────────────────────────────────

  async function doSearch() {
    const query = v('inp-query');
    const errEl = ge('search-error');
    errEl.classList.remove('visible');
    if (!query) { showErr(errEl, 'Informe o nome ou IP do VS.'); return; }

    closePanel();
    ge('matches-section').style.display = 'none';
    ge('summary-section').style.display = 'none';
    ge('click-hint').style.display = 'none';
    setLoading('spin-search', 'btn-search', true);
    try {
      const resp = await post('/api/search', { session_id: sessionId, query });
      const data = await resp.json();
      if (!resp.ok) { showErr(errEl, data.detail || 'Erro na busca.'); return; }
      if (data.matches.length === 1) {
        await doMap(data.matches[0]);
      } else {
        renderMatchList(data.matches);
      }
    } finally { setLoading('spin-search', 'btn-search', false); }
  }

  function renderMatchList(matches) {
    const list = ge('match-list');
    list.innerHTML = '';
    ge('matches-title').textContent = `${matches.length} resultado${matches.length > 1 ? 's' : ''}`;
    matches.forEach(m => {
      const item = document.createElement('div');
      item.className = 'match-item';
      item.innerHTML = `<div class="match-name">${esc(m.name)}</div><div class="match-dest">${esc(m.destination)}</div><div class="match-part">Partition: ${esc(m.partition)}</div>`;
      item.addEventListener('click', () => {
        list.querySelectorAll('.match-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        doMap(m);
      });
      list.appendChild(item);
    });
    ge('matches-section').style.display = 'block';
  }

  // ── Map ───────────────────────────────────────────────

  async function doMap(vs) {
    ge('cy').style.display = 'none';
    ge('placeholder').style.display = 'flex';
    ge('summary-section').style.display = 'none';
    ge('zoom-controls').classList.remove('visible');
    ge('legend').classList.remove('visible');
    ge('toolbar-label').textContent = `Carregando ${vs.name}…`;
    destroyCy();
    closePanel();

    const resp = await post('/api/map', { session_id: sessionId, partition: vs.partition, vs_name: vs.name });
    const data = await resp.json();
    if (!resp.ok) {
      ge('toolbar-label').textContent = 'Erro ao carregar VS.';
      showErr(ge('search-error'), data.detail || 'Erro ao mapear VS.');
      return;
    }

    detailStore = data.detail_store || {};
    renderCytoscape(data.graph);
    updateSummary(data);
  }

  // ── Cytoscape ─────────────────────────────────────────

  function renderCytoscape(graphData) {
    ge('placeholder').style.display = 'none';
    ge('cy').style.display = 'block';

    cy = cytoscape({
      container: ge('cy'),
      elements: [...graphData.nodes, ...graphData.edges],
      style: CY_STYLE,
      layout: {
        name: 'dagre',
        rankDir: 'LR',
        nodeSep: 40,
        rankSep: 120,
        edgeSep: 20,
        padding: 60,
        animate: false,
        nodeDimensionsIncludeLabels: true,
        ranker: 'network-simplex',
      },
      wheelSensitivity: 0.3,
      minZoom: 0.05,
      maxZoom: 5,
    });

    // Click on policy / irule → show detail panel
    cy.on('tap', 'node[type="policy"], node[type="policy_asm"], node[type="irule"]', function(evt) {
      showDetail(evt.target.id());
    });

    // Cursor feedback
    cy.on('mouseover', 'node[type="policy"], node[type="policy_asm"], node[type="irule"]', () => ge('cy').style.cursor = 'pointer');
    cy.on('mouseout',  'node[type="policy"], node[type="policy_asm"], node[type="irule"]', () => ge('cy').style.cursor = 'default');

    // Zoom level display
    cy.on('zoom', () => ge('zoom-level').textContent = Math.round(cy.zoom() * 100) + '%');
    ge('zoom-level').textContent = Math.round(cy.zoom() * 100) + '%';

    ge('zoom-controls').classList.add('visible');
    ge('legend').classList.add('visible');
  }

  function destroyCy() { if (cy) { cy.destroy(); cy = null; } }
  function cyZoomIn()  { cy && cy.zoom({ level: cy.zoom() * 1.25, renderedPosition: cyCenter() }); }
  function cyZoomOut() { cy && cy.zoom({ level: cy.zoom() * 0.8,  renderedPosition: cyCenter() }); }
  function cyFit()     { cy && cy.fit(undefined, 40); }
  function cyCenter()  { const el = ge('cy'); return { x: el.clientWidth / 2, y: el.clientHeight / 2 }; }

  function exportPNG() {
    if (!cy) return;
    const png = cy.png({ scale: 2, full: true, bg: '#f6f8fa' });
    const a = document.createElement('a');
    a.href = png; a.download = 'f5-vs-flow.png'; a.click();
  }

  function updateSummary(data) {
    const s = data.summary;
    ge('vs-label').textContent = `${data.vs_name}  ·  ${data.destination}`;
    ge('s-pools').textContent = s.total_pools;
    ge('s-policies').textContent = s.policies;
    ge('s-irules').textContent = s.irules;
    const dp = s.default_pool || '—';
    ge('s-default').textContent = dp.split('/').pop() || dp;
    ge('summary-section').style.display = 'block';
    ge('toolbar-label').textContent = `VS: ${data.vs_name}  |  Dest: ${data.destination}`;

    const wafBadge = ge('waf-badge');
    if (s.waf) {
      wafBadge.textContent = `⚠ WAF: ${s.waf}`;
      wafBadge.classList.add('visible');
    } else {
      wafBadge.classList.remove('visible');
    }

    const hasDetails = Object.keys(detailStore).length > 0;
    ge('click-hint').style.display = hasDetails ? 'inline' : 'none';
  }

  // ── Detail Panel ──────────────────────────────────────

  function showDetail(nodeId) {
    const detail = detailStore[nodeId];
    if (!detail) return;
    ge('panel-title').textContent = detail.name;
    const badge = ge('panel-badge');
    const body  = ge('panel-body');
    if (detail.type === 'policy') {
      badge.textContent = 'LTM Policy'; badge.className = 'type-badge type-policy';
      body.innerHTML = renderPolicy(detail);
    } else {
      badge.textContent = 'iRule'; badge.className = 'type-badge type-irule';
      body.innerHTML = renderIRule(detail);
    }
    ge('detail-panel').classList.add('open');
  }

  function closePanel() { ge('detail-panel').classList.remove('open'); }

  function renderPolicy(detail) {
    if (!detail.rules || !detail.rules.length) return '<p class="empty-note">Nenhuma regra encontrada.</p>';
    return detail.rules.map(rule => {
      const conds = (rule.conditions || []).map(c => {
        const not  = c.not ? 'NOT ' : '';
        const op   = c.startsWith ? 'startsWith' : c.endsWith ? 'endsWith' : c.contains ? 'contains' : c.equals ? 'equals' : c.matches ? 'matches' : 'is';
        const subj = c.httpUri ? (c.path ? 'URI.path' : 'URI') : c.httpHeader ? `Header(${c.tmName||''})` : c.httpMethod ? 'Method' : (c.address && c.tcp) ? 'src-IP' : c.sslExtension ? 'SSL' : 'match';
        const val  = c.datagroup ? `datagroup:${c.datagroup.split('/').pop()}` : (c.values||[]).join(', ');
        return `<div class="cond-row">${esc(subj)} ${esc(not+op)} ${esc(val)}</div>`;
      }).join('') || '<div class="empty-note">Sem condições (default)</div>';

      const acts = (rule.actions || []).map(a => {
        if (a.asm)                   return `<div class="act-waf">WAF enforce: ${esc(a.policy || 'ASM Policy')}</div>`;
        if (a.forward && a.pool)     return `<div class="act-row">forward → pool: ${esc(a.pool)}</div>`;
        if (a.redirect && a.location)return `<div class="act-row">redirect → ${esc(a.location)}</div>`;
        if (a.reset)                 return `<div class="act-row">reset</div>`;
        if (a.drop)                  return `<div class="act-row">drop</div>`;
        if (a.persist)               return `<div class="act-row">persist: ${esc(a.tmName||'')}</div>`;
        const skip = new Set(['name','ordinal','kind','selfLink','generation','fullPath','code','expirySecs','length','offset','port','timeout','vlanId','status']);
        const key  = Object.keys(a).find(k => !skip.has(k) && a[k] === true) || 'action';
        const extra = a.location ? ` → ${esc(a.location)}` : a.pool ? ` → ${esc(a.pool)}` : '';
        return `<div class="act-row">${esc(key)}${extra}</div>`;
      }).join('') || '<div class="empty-note">Sem ações</div>';

      return `<div class="rule-block">
        <div class="rule-title"><span class="rule-ord">#${rule.ordinal}</span>${esc(rule.name)}</div>
        <div class="rule-section"><div class="section-title">Condições</div>${conds}</div>
        <div class="rule-section"><div class="section-title">Ações</div>${acts}</div>
      </div>`;
    }).join('');
  }

  function renderIRule(detail) {
    const content = detail.content || '';
    return `
      <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
        <button class="btn-secondary" style="width:auto;margin-top:0;padding:3px 10px;font-size:.75rem"
                onclick="copyIRule()">Copiar</button>
      </div>
      <textarea id="irule-raw" readonly
        style="width:100%;height:calc(100vh - 200px);background:#0d1117;border:1px solid #30363d;
               border-radius:6px;color:#e6edf3;font-family:'Consolas','Monaco',monospace;
               font-size:.76rem;line-height:1.65;padding:12px;resize:none;outline:none"
      >${esc(content)}</textarea>`;
  }

  function copyIRule() {
    const ta = ge('irule-raw');
    if (!ta) return;
    navigator.clipboard.writeText(ta.value).then(() => {
      const btn = ta.previousElementSibling.querySelector('button');
      btn.textContent = 'Copiado!';
      setTimeout(() => btn.textContent = 'Copiar', 1500);
    });
  }

  // ── Utils ─────────────────────────────────────────────
  const ge   = id => document.getElementById(id);
  const v    = id => ge(id).value.trim();
  const post = (url, body) => fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const esc  = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  function showErr(el, msg) { el.textContent = msg; el.classList.add('visible'); }
  function setLoading(sid, bid, on) { ge(sid).classList.toggle('active', on); ge(bid).disabled = on; }
</script>
</body>
</html>
